name: Daily Top Quant Gits Digest

on:
  workflow_dispatch:
    inputs:
      days:
        description: Lookback window in days
        required: false
        default: "90"
      top:
        description: Repositories per category
        required: false
        default: "5"
  schedule:
    # Pin directly in UTC so the workflow fires reliably at 7:00 AM IST.
    - cron: "30 1 * * *"

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: windows-latest
    concurrency:
      group: top-quant-gits-daily
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate digest
        shell: bash
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          TOP_QUANT_GITS_OUTPUT_DIR: output
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          args=(--days "${{ inputs.days || '90' }}" --top "${{ inputs.top || '5' }}")
          if [[ -n "${TELEGRAM_BOT_TOKEN}" && -n "${TELEGRAM_CHAT_ID}" ]]; then
            args+=(--send-telegram)
          fi
          python -m top_quant_gits.main "${args[@]}"

      - name: Commit latest digest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/latest_digest.md
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "Update latest Top Quant Gits digest"
            git push
          fi

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Top Quant Gits Digest"
            echo
            cat output/latest_digest.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: top-quant-gits-digest
          path: |
            output/latest_digest.md
            output/latest_digest.pdf
            output/latest_digest.html
          if-no-files-found: error
